name: PALACE
options:
  bundleIdPrefix: com.wsig
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 49HAGQE8FB
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_KEY_CFBundleDisplayName: PALACE
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "PALACE uses your microphone for voice conversations with Marlin."
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "PALACE uses your location to log where your conversations happen."
    INFOPLIST_KEY_NSContactsUsageDescription: "PALACE matches your contacts to show photos next to people in your conversations."
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "PALACE uses speech recognition for live voice conversations with Marlin."
targets:
  PALACE:
    type: application
    platform: iOS
    sources:
      - path: PALACE
        excludes:
          - Resources
    resources:
      - path: PALACE/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: PALACE
        PRODUCT_BUNDLE_IDENTIFIER: com.wsig.palace-native
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: systemBackground
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ALWAYS_SEARCH_USER_PATHS: false
