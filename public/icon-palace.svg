<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="castle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8956a"/>
      <stop offset="100%" stop-color="#d4577a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8956a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4577a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle glow behind castle -->
  <ellipse cx="512" cy="580" rx="280" ry="200" fill="url(#glow)"/>

  <!-- Castle base -->
  <rect x="312" y="480" width="400" height="220" rx="8" fill="url(#castle)"/>

  <!-- Left tower -->
  <rect x="280" y="360" width="80" height="340" rx="6" fill="url(#castle)"/>
  <!-- Left tower battlement -->
  <rect x="272" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>
  <rect x="308" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>
  <rect x="344" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>

  <!-- Right tower -->
  <rect x="664" y="360" width="80" height="340" rx="6" fill="url(#castle)"/>
  <!-- Right tower battlement -->
  <rect x="656" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>
  <rect x="692" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>
  <rect x="728" y="340" width="28" height="40" rx="4" fill="url(#castle)"/>

  <!-- Center tower (tallest) -->
  <rect x="432" y="260" width="160" height="440" rx="8" fill="url(#castle)"/>
  <!-- Center tower battlement -->
  <rect x="424" y="236" width="32" height="44" rx="4" fill="url(#castle)"/>
  <rect x="464" y="236" width="32" height="44" rx="4" fill="url(#castle)"/>
  <rect x="504" y="236" width="32" height="44" rx="4" fill="url(#castle)"/>
  <rect x="544" y="236" width="32" height="44" rx="4" fill="url(#castle)"/>
  <rect x="580" y="236" width="20" height="44" rx="4" fill="url(#castle)"/>

  <!-- Gate arch -->
  <rect x="462" y="580" width="100" height="120" rx="50" fill="#1a1a2e"/>
  <rect x="462" y="630" width="100" height="70" fill="#1a1a2e"/>

  <!-- Windows on center tower -->
  <rect x="472" y="320" width="24" height="36" rx="12" fill="#1a1a2e" opacity="0.7"/>
  <rect x="528" y="320" width="24" height="36" rx="12" fill="#1a1a2e" opacity="0.7"/>

  <!-- Windows on left tower -->
  <rect x="306" y="420" width="20" height="30" rx="10" fill="#1a1a2e" opacity="0.7"/>

  <!-- Windows on right tower -->
  <rect x="698" y="420" width="20" height="30" rx="10" fill="#1a1a2e" opacity="0.7"/>

  <!-- Flag on center tower -->
  <line x1="512" y1="236" x2="512" y2="176" stroke="#e8956a" stroke-width="4" stroke-linecap="round"/>
  <path d="M514 176 L548 192 L514 208 Z" fill="#d4577a"/>
</svg>
