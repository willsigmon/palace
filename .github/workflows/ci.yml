name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios-native:
    name: Native iOS shell build
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Select an available iPhone simulator
        run: |
          python3 <<'PY2' >> "$GITHUB_ENV"
          import json
          import subprocess

          preferred_names = [
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15",
              "iPhone 14 Pro",
              "iPhone 14",
          ]

          devices = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )["devices"]

          candidates = []
          for runtime, runtime_devices in devices.items():
              if "iOS" not in runtime:
                  continue
              for device in runtime_devices:
                  if not device.get("isAvailable"):
                      continue
                  if not device["name"].startswith("iPhone"):
                      continue
                  name_rank = preferred_names.index(device["name"]) if device["name"] in preferred_names else len(preferred_names)
                  candidates.append((name_rank, runtime, device["name"], device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found")

          candidates.sort()
          _, runtime, name, udid = candidates[0]
          print(f"IOS_DESTINATION=platform=iOS Simulator,id={udid}")
          print(f"Selected simulator: {name} ({runtime})")
          PY2

      - name: Build native shell for Simulator
        run: |
          xcodebuild             -project ios-native/PALACE.xcodeproj             -scheme PALACE             -configuration Debug             -destination "$IOS_DESTINATION"             build

      - name: Build native shell for simulator
        run: |
          xcodebuild             -project ios-native/PALACE.xcodeproj             -scheme PALACE             -configuration Release             -destination "$IOS_DESTINATION"             CODE_SIGNING_ALLOWED=NO             build

  ios-capacitor:
    name: Capacitor iOS wrapper build
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Select an available iPhone simulator
        run: |
          python3 <<'PY2' >> "$GITHUB_ENV"
          import json
          import subprocess

          preferred_names = [
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15",
              "iPhone 14 Pro",
              "iPhone 14",
          ]

          devices = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )["devices"]

          candidates = []
          for runtime, runtime_devices in devices.items():
              if "iOS" not in runtime:
                  continue
              for device in runtime_devices:
                  if not device.get("isAvailable"):
                      continue
                  if not device["name"].startswith("iPhone"):
                      continue
                  name_rank = preferred_names.index(device["name"]) if device["name"] in preferred_names else len(preferred_names)
                  candidates.append((name_rank, runtime, device["name"], device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found")

          candidates.sort()
          _, runtime, name, udid = candidates[0]
          print(f"IOS_DESTINATION=platform=iOS Simulator,id={udid}")
          print(f"Selected simulator: {name} ({runtime})")
          PY2

      - name: Build Capacitor wrapper for Simulator
        run: |
          xcodebuild             -project ios/App/App.xcodeproj             -scheme App             -configuration Debug             -destination "$IOS_DESTINATION"             build

      - name: Build Capacitor wrapper for simulator
        run: |
          xcodebuild             -project ios/App/App.xcodeproj             -scheme App             -configuration Release             -destination "$IOS_DESTINATION"             CODE_SIGNING_ALLOWED=NO             build
