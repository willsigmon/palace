<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <!-- Gradient accent -->
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- P letterform -->
  <text x="256" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="320" font-style="italic" font-weight="400" fill="url(#accent)">P</text>
</svg>
